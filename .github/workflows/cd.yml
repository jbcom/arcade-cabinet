name: Deploy & Publish Apps

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to receive APK assets"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.event_name == 'push' && 'pages-deploy' || format('apk-publish-{0}', github.event.release.tag_name || inputs.release_tag) }}
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build with Astro
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6.1.1
        with:
          path: apps/docs
          package-manager: pnpm

  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  build-apks:
    name: Build Android APKs
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        app: [
          "bioluminescent-sea",
          "cosmic-gardener",
          "enchanted-forest",
          "entropy-edge",
          "gridizen",
          "mega-track",
          "otterly-chaotic",
          "primordial-ascent",
          "protocol-snw",
          "reach-for-the-sky",
          "realmwalker",
          "sim-soviet",
          "titan-mech",
          "voxel-realms"
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify target release exists
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup pnpm
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Capacitor
        run: |
          cd apps/${{ matrix.app }}
          pnpm run build
          pnpm exec cap sync android

      - name: Build APK
        run: |
          cd apps/${{ matrix.app }}/android
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv apps/${{ matrix.app }}/android/app/build/outputs/apk/debug/app-debug.apk ${{ matrix.app }}-debug.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ${{ matrix.app }}-debug.apk
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
